name: github-profiles-automator
title: GitHub Profiles Automator charm
summary: A charm for automating the management of Kubeflow Profiles from a GitHub repository
description: |
  A charm to automatically sync Kubeflow Profiles from information a GitHub repository.

  This charm is responsible for monitoring a file from a GitHub repo that represents
  which Profiles and Contributors should exist in a cluster. Then, via a reconciliation loop
  the charm will update the Profiles and RoleBindings and AuthorizationPolicies in the
  cluster to align with this representation.

  It is useful for cluster administrators who want to automatically update
  the profiles on the cluster, based on a single source of truth.

containers:
  git-sync:
    resource: git-sync-image
    # Non-root user, this corresponds to the `git-sync` user specified in the upstream Dockerfile:
    # https://github.com/kubernetes/git-sync/blob/master/Dockerfile.in
    uid: 65533
    gid: 65533
    mounts:
      - storage: content-from-git
        location: /git

resources:
  git-sync-image:
    type: oci-image
    description: OCI image for the 'git-sync' container
    upstream-source: registry.k8s.io/git-sync/git-sync:v4.4.0

storage:
  content-from-git:
    type: filesystem

charm-user: non-root

requires:
  require-cmr-mesh:
    interface: cross_model_mesh
    description: |
      Allow a cross-model application access to catalogue via the service mesh.
      This relation provides additional data required by the service mesh to enforce
      cross-model authorization policies.
      If this app relates to other applications on a charmed service mesh cross-model,
      use this relation to send that related app additional data needed to automatically
      generate traffic authorization policies. This is required because Juju does not
      natively provide all information required to build these policies when related
      cross-model.
  service-mesh:
    limit: 1
    interface: service_mesh
    description: |
      Subscribe this charm into a service mesh to enforce authorization policies.
provides:
  provide-cmr-mesh:
    interface: cross_model_mesh
    description: |
      Access a cross-model application from catalogue via the service mesh.
      This relation provides additional data required by the service mesh to enforce
      cross-model authorization policies.
      If this app is generating policies to provide access to related applications that
      are cross-model, relate that app to this additional relation to retrieve additional
      data required for these policies. This is required because Juju does not natively
      provide all information required to build these policies when related cross-model.
